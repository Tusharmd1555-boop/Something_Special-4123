<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unlock Your Love Surprise</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffe6f0, #ffd6f0);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    font-family: Arial, sans-serif;
  }

  /* Heart falling animation styles */
  .heart {
    position: absolute;
    font-size: 24px;
    color: pink;
    opacity: 0.8;
    animation: fall 4s linear forwards;
    pointer-events: none;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) scale(0.5);
      opacity: 0;
    }
  }

  /* The white box styles */
  .white-box {
    background: #fff;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    z-index: 1;
    text-align: center;
  }

  /* Text inside the box */
  .box-text {
    font-size: 24px;
    color: #8e2f7b;
    margin-bottom: 20px;
  }

  /* Code input style */
  .code-input {
    width: 70%;
    padding: 12px;
    font-size: 18px;
    border: 2px solid #ccc;
    border-radius: 8px;
    margin-bottom: 20px;
    outline: none;
  }

  /* Unlock button style */
  .unlock-btn {
    padding: 12px 24px;
    font-size: 16px;
    background-color: rgb(225, 134, 149);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .unlock-btn:hover {
    background-color: #7f1b85;
  }
</style>
</head>
<body>

<!-- Script to generate falling hearts -->
<script>
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '♥';

    // Random start position
    heart.style.left = Math.random() * 100 + 'vw';

    // Optional: random size
    const size = Math.random() * 10 + 20;
    heart.style.fontSize = size + 'px';

    document.body.appendChild(heart);

    // Remove the heart after animation
    setTimeout(() => {
      heart.remove();
    }, 4000);
  }

  // Generate hearts periodically
  setInterval(createHeart, 300);
</script>

<!-- White box with message and code input -->
<div class="white-box">
  <div class="box-text">🔓 Unlock Your Surprise 🔓</div>
  <input type="password" id="code" class="code-input" placeholder="Enter your love message..." />
  <br />
  <button class="unlock-btn" onclick="checkCode()">Unlock</button>
</div>

<script>
  function checkCode() {
    const code = document.getElementById('code').value.trim();
    if (code === 'I love you Trisha') {
      // Redirect to another HTML file
      window.location.href = 'happy.html'; // Change this to your target page
    } else {
      alert('❌ Incorrect code. Please try again! ❌');
    }
  }
</script>

</body>
</html>
