<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Can You Mine?</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffccd5, #ffe6f0);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    position: relative;
  }

  /* Heart animation styles */
  .heart {
    position: absolute;
    top: -50px;
    font-size: 24px;
    color: pink;
    opacity: 0.8;
    animation-name: fall;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0;
    }
  }

  /* Generate hearts continuously */
  /* Using JavaScript below */

  /* White box styles with shadow */
  .white-box {
    background: #fff;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.2), inset 0 0 10px rgba(0,0,0,0.1);
    max-width: 400px;
    width: 90%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* Text inside the box */
  .question-text {
    font-size: 24px;
    color: #7a2072;
    margin-bottom: 30px;
  }

  /* Buttons styles */
  .pink-button {
    padding: 12px 24px;
    font-size: 16px;
    background-color: pink;
    color: white;
    border: none;
    border-radius: 8px;
    margin: 0 10px;
    cursor: pointer;
    transition: background-color 0.3s;
    text-decoration: none;
    display: inline-block;
  }

  .pink-button:hover {
    background-color: #ff69b4;
  }
</style>
</head>
<body>

<!-- Heart animation generator -->
<script>
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '♥';

    // Random horizontal position
    heart.style.left = Math.random() * 100 + 'vw';

    // Random size
    const size = Math.random() * 10 + 20; // 20px to 30px
    heart.style.fontSize = size + 'px';

    // Random animation duration
    const duration = Math.random() * 5 + 5; // 5s to 10s
    heart.style.animationDuration = duration + 's';

    // Random delay
    const delay = Math.random() * 2; // up to 2s
    heart.style.animationDelay = delay + 's';

    document.body.appendChild(heart);

    // Remove after animation
    setTimeout(() => {
      heart.remove();
    }, (duration + 1) * 1000);
  }

  // Generate hearts continuously
  setInterval(createHeart, 300);
  // Generate initial hearts
  for (let i = 0; i < 10; i++) {
    createHeart();
  }
</script>

<!-- White box with emojis, text, and links -->
<div class="white-box">
  <div class="question-text">
    ❤️😊 Can you mine? ❤️😊
  </div>
  <!-- Buttons linking to other pages -->
  <a href="yes.html" class="pink-button">❤️Yes</a>
  <a href="no.html" class="pink-button">♥No</a>
</div>

</body>
</html>
