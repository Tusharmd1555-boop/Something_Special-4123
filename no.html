<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ffccd5, #ffe6f0);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  /* White box styles with shadow in the middle */
  .white-box {
    background: #fff;
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.2), inset 0 0 10px rgba(0,0,0,0.1);
    max-width: 400px;
    width: 90%;
    text-align: center;
  }

  /* Text inside the box */
  .message-text {
    font-size: 24px;
    color: #333;
  }
</style>
</head>
<body>

<div class="white-box">
  <div class="message-text">😈 I will kill you 🔪</div>
</div>

</body>
</html>
